name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Step 1 - Checkout Repo
        uses: actions/checkout@v4

      - name: Step 2 - Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Step 3 - Install Dependencies
        run: npm ci

      - name: Step 4 - Run Linting (Quality Check)
        run: npm run lint

      - name: Step 5 - Build Artifact
        run: npm run build

      - name: Step 6 - Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist